name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: [nodejs, python]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Setup 
      uses: actions/setup-$${{ matrix.language }}@v2
      with:
        $${{ matrix.language }}-version-file: '.nvmrc'

    - name: Install dependencies
      run: |
        if [ "$${{ matrix.language }}" == "nodejs" ]; then
          npm install
        elif [ "$${{ matrix.language }}" == "python" ]; then
          pip install -r requirements.txt
        fi

    - name: Run tests
      run: |
        if [ "$${{ matrix.language }}" == "nodejs" ]; then
          npm test
        elif [ "$${{ matrix.language }}" == "python" ]; then
          pytest
        fi

  deploy:
    runs-on: ubuntu-latest
    needs: build
    env:
      ENVIRONMENT: production
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Deploy to Azure
      run: |
        echo 'Deployment step goes here'